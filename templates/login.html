<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Fuel Route Planner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-size: 0.9rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3b82f6; }
    button {
      width: 100%;
      padding: 11px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }
    button:hover { background: #2563eb; }
    button:disabled { background: #475569; cursor: not-allowed; }
    #error {
      margin-top: 14px;
      padding: 10px 12px;
      background: #450a0a;
      border: 1px solid #dc2626;
      border-radius: 6px;
      font-size: 0.83rem;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>⛽ Fuel Route Planner</h1>
    <p class="subtitle">Sign in to plan your route</p>

    <label for="username">Username</label>
    <input id="username" type="text" autocomplete="username" placeholder="Enter username" />

    <label for="password">Password</label>
    <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" />

    <button id="loginBtn" onclick="login()">Sign in</button>
    <div id="error"></div>

    <p style="margin-top:20px;text-align:center;font-size:0.83rem;color:#64748b;">
      Don't have an account? <a href="/signup/" style="color:#3b82f6;text-decoration:none;">Sign up</a>
    </p>
  </div>

  <script>
    // If already logged in, skip the login page
    if (localStorage.getItem("access_token")) {
      window.location.href = "/api/map/";
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("loginBtn");

      errorEl.style.display = "none";

      if (!username || !password) {
        showError("Please enter both username and password.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Signing in…";

      try {
        const res = await fetch("/api/auth/token/", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || "Invalid credentials.");
          return;
        }

        localStorage.setItem("access_token", data.access);
        localStorage.setItem("refresh_token", data.refresh);
        window.location.href = "/api/map/";
      } catch (err) {
        showError("Could not reach the server. Please try again.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    }

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.style.display = "block";
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
